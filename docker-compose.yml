services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/outputs:/app/outputs
      - ./backend/jobs:/app/jobs
    environment:
      AUDIO2MIDI_LOG_LEVEL: INFO
      AUDIO2MIDI_MAX_UPLOAD_MB: "120"

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE: http://backend:8000
    depends_on:
      - backend
